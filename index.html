<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SAI FROGGER: DATA LEAK</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; text-align: center; }
        canvas { background: #010; border: 2px solid #0f0; display: block; margin: 10px auto; box-shadow: 0 0 20px #050; max-width: 95vw; max-height: 70vh; }
        .ui { padding: 10px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 200px; margin: 0 auto; }
        .btn { background: #0f0; color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 5px; font-family: monospace; font-size: 14px; }
        .btn:active { background: #0a0; }
        #status { font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="ui">
        <div style="background:#0f0; color:#000; font-weight:bold; padding:5px;">SAI_FROGGER v1.0</div>
        <div id="status">LEVEL: 1 | XP: 0</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div></div><button class="btn" onclick="move('up')">UP</button><div></div>
        <button class="btn" onclick="move('left')">LEFT</button>
        <button class="btn" onclick="move('down')">DOWN</button>
        <button class="btn" onclick="move('right')">RIGHT</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        canvas.width = 320;
        canvas.height = 400;

        const gridSize = 40;
        let player = { x: 160, y: 360, size: 30 };
        let enemies = [];
        let level = 1;
        let xp = 0;

        function initEnemies() {
            enemies = [];
            for(let i = 1; i < 9; i++) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: i * gridSize,
                    speed: (Math.random() * 2 + 1) * (i % 2 === 0 ? 1 : -1) * (1 + (level * 0.2)),
                    width: 60,
                    color: i < 5 ? '#f00' : '#38bdf8'
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            ctx.fillRect(0, 0, canvas.width, gridSize);
            ctx.fillStyle = '#000';
            ctx.font = "14px monospace";
            ctx.fillText("DATA CORE", 120, 25);

            enemies.forEach(en => {
                en.x += en.speed;
                if(en.x > canvas.width) en.x = -en.width;
                if(en.x < -en.width) en.x = canvas.width;

                ctx.fillStyle = en.color;
                ctx.fillRect(en.x, en.y + 5, en.width, 30);
                
                if (player.x < en.x + en.width && player.x + 20 > en.x &&
                    player.y < en.y + gridSize && player.y + 20 > en.y) {
                    resetPlayer();
                }
            });

            ctx.fillStyle = '#fff';
            ctx.font = "20px monospace";
            ctx.fillText("(^_^)", player.x, player.y + 25);

            if (player.y <= 0) {
                level++;
                xp += 100;
                resetPlayer();
                initEnemies();
            }

            status.innerText = `LEVEL: ${level} | XP: ${xp}`;
            requestAnimationFrame(draw);
        }

        function move(dir) {
            if(dir === 'up') player.y -= gridSize;
            if(dir === 'down') player.y += gridSize;
            if(dir === 'left') player.x -= gridSize;
            if(dir === 'right') player.x += gridSize;
            
            if(player.x < 0) player.x = 0;
            if(player.x > canvas.width - 30) player.x = canvas.width - 30;
            if(player.y > canvas.height - gridSize) player.y = canvas.height - gridSize;
        }

        function resetPlayer() {
            player.x = 160;
            player.y = 360;
        }

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') move('up');
            if(e.key === 'ArrowDown') move('down');
            if(e.key === 'ArrowLeft') move('left');
            if(e.key === 'ArrowRight') move('right');
        });

        initEnemies();
        draw();
    </script>
</body>
</html>
